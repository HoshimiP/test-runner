name: PXE QEMU TestA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  pxe_test:
    runs-on: [self-hosted, linux, pxe-qemu]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PXE environment
        run: |
          sudo ./runner.sh pxe qemu

      - name: Copy kernel to TFTP root
        run: |
          sudo cp axvisor /var/lib/tftpboot/kernel

      - name: Boot QEMU via PXE
        run: |
          sudo qemu-system-x86_64 \
            -boot n \
            -m 128M \
            -smp 1 \
            -machine q35 \
            -cpu host \
            -enable-kvm \
            -netdev tap,id=mynet0,ifname=tap-runner-pxe,script=no,downscript=no \
            -device e1000,netdev=mynet0 \
            -device virtio-blk-pci,drive=disk0 \
            -drive id=disk0,if=none,format=raw,file=/path/to/rootfs.img \
            -nographic